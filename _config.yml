# Site Settings
title                    : "Xiaoqian Liu"
description              : "School of Electronic and Information Engineering, Lanzhou Jiaotong University"
repository               : "xiaoqianliu1/xiaoqianliu1.github.io"
google_scholar_stats_use_cdn : true

# Site Author
author:
  name             : "Xiaoqian Liu"
  avatar           : "images/lxq.png"
  bio              : "Associate Professor | Master's Supervisor | Gansu Longyuan Talent"
  location         : "Lanzhou, Gansu, China"
  employer         : "Lanzhou Jiaotong University"
  googlescholar    : "https://scholar.google.com/citations?user=OMIyPGQAAAAJ&hl=zh-CN"
  email            : "xiaoqianliu@mail.lzjtu.cn"
  orcid            : "https://orcid.org/yourorcidurl"
  github           : ""

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
